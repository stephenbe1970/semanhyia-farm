{% extends 'base.html' %}

{% block content %}
<h4 class="text-white mb-4">Bank account management</h4>

{% if bank_info %}
<div class="p-3 mb-4 rounded" style="background: #1e3a5f; color: #a3c2f0;">
    Currently saved: {{ bank_info.real_name }} | {{ bank_info.network_name }}: {{ bank_info.account_number }}
</div>
{% endif %}

<form method="POST">
    {% csrf_token %}
    <label class="text-white mb-2">Real Name</label>
<input type="text" name="real_name" value="{{ bank_info.real_name|default:'' }}" class="form-control bg-dark text-white border-secondary mb-3" required>

<label class="text-white mb-2">Bank/Network Name</label>
<select name="network_name" class="form-select bg-dark text-white border-secondary mb-3">
    <option value="MTN MoMo" {% if bank_info.network_name == "MTN MoMo" %}selected{% endif %}>MTN MoMo</option>
    <option value="Telecel" {% if bank_info.network_name == "Telecel" %}selected{% endif %}>Telecel</option>
    <option value="AirtelTigo" {% if bank_info.network_name == "AirtelTigo" %}selected{% endif %}>AirtelTigo</option>
</select>

<label class="text-white mb-2">Account/Phone Number</label>
<input type="text" name="account_number" value="{{ bank_info.account_number|default:'' }}" class="form-control bg-dark text-white border-secondary mb-4" required>

    <button type="submit" class="btn btn-success w-100">Save Account Details</button>
</form>
{% endblock %}
