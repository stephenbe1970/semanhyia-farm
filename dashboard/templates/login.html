{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Semanhyia Farms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }

        /* 1. Background Layer - This is where the blur happens */
        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("{% static 'images/image.avif' %}");
            background-size: cover;
            background-position: center;
            filter: blur(8px); /* The background is blurry */
            z-index: -1;      /* Stays behind everything */
        }

        /* 2. Content Layer - Centering the form */
        .content-layer {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 3. Your Specific Form Style */
        .login-box {
            background: rgba(32, 32, 37, 0.9); /* Dark solid background for the form itself */
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: 0 4px 15px rgba(51, 39, 39, 0.5);
        }

        .form-control { background: #2a2a35; border: none; color: white; margin-bottom: 15px; }
        .btn-login { background-color: #2E7D32; color: white; width: 100%; border: none; padding: 10px; border-radius: 5px; }
        .form-label { display: block; text-align: left; margin-bottom: 5px; }
        a { color: #81C784; text-decoration: none; }
    </style>
</head>
<body>

    <div class="background-layer"></div>

    <div class="content-layer">
        <div class="login-box">
            <h3>Login to your account</h3>
            
            {% for message in messages %}
                <div class="alert alert-info">{{ message }}</div>
            {% endfor %}

            <form method="POST">
                {% csrf_token %}
                
                <label class="form-label">Mobile Number</label>
                <input type="text" name="mobile" class="form-control" placeholder="+233..." required>
                
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                
                <button type="submit" class="btn btn-login">Log in now</button>
            </form>
            
            <p class="mt-3">Don't have an account? <br><a href="/register/">Register now</a></p>
        </div>
    </div>

</body>
</html>
