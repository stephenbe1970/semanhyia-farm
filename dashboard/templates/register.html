{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Semanhyia Farms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; }

        /* 1. Background Layer - This handles the blur */
        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("{% static 'images/image.avif' %}");
            background-size: cover;
            background-position: center;
            filter: blur(8px);
            z-index: -1;
        }

        /* 2. Content Layer - Centers the form */
        .content-layer {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 3. The Register Box */
        .register-box {
            background: rgba(30, 30, 40, 0.9);
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .form-control { background: #2a2a35; border: none; color: white; margin-bottom: 15px; }
        .btn-register { background-color: #2E7D32; color: white; width: 100%; border: none; padding: 10px; border-radius: 5px; }
        .form-label { display: block; text-align: left; margin-bottom: 5px; }
        a { color: #81C784; text-decoration: none; }
    </style>
</head>
<body>

    <div class="background-layer"></div>

    <div class="content-layer">
        <div class="register-box">
            <h3>🐄 Semanhyia Farms</h3>
            <h4>Create your account</h4>
            
            {% for message in messages %}
                <div class="alert alert-info text-center">{{ message }}</div>
            {% endfor %}

            <form method="POST">
                {% csrf_token %}
                
                <label class="form-label">Mobile Number</label>
                <input type="text" name="mobile" class="form-control" placeholder="+233..." required>
                
                <label class="form-label">Login password</label>
                <input type="password" name="password" class="form-control" placeholder="Login password" required>
                
                <label class="form-label">Repeat password</label>
                <input type="password" name="repeat_password" class="form-control" placeholder="Repeat password" required>
                
                <label class="form-label">Invitation code</label>
                <input type="text" name="invite_code" class="form-control" value="{{ ref_code|default:'' }}" placeholder="Invitation code">
                
                <button type="submit" class="btn btn-register mt-2">Register now</button>
            </form>
            
            <p class="mt-3">Already registered? <a href="/login/">Log in</a></p>
        </div>
    </div>

</body>
</html>
