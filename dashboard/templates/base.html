{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Semanhyia Farms</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Reset and layout */
        html, body { 
    height: 100%; 
    margin: 0; 
    padding: 0;
    overflow: hidden; /* CRITICAL: This kills the body scrollbar */
    background-color: #212529;
}

        /* The Main App Window */
        .mobile-container {
    max-width: 500px;
    margin: 0 auto;
    height: 100%; /* Use 100% instead of 100vh */
    display: flex;
    flex-direction: column;
    background-color: #212529;
}

/* Make only this section scrollable */
.content-wrapper {
    flex: 1;
    overflow-y: auto; /* The ONLY thing that should scroll */
    padding: 15px;
    -webkit-overflow-scrolling: touch; /* Makes scrolling smooth on iPhones */
}

        .table-responsive {
            overflow-x: auto;
            width: 100%;
            margin-bottom: 1rem;
        }

        /* Navigation Bar */
        .bottom-nav {
    height: 70px;
    background: #222;
    border-top: 1px solid #444;
    display: flex;
    justify-content: space-around;
    align-items: center;
    flex-shrink: 0; /* Keeps it from getting squashed */
}

        .nav-link-custom { 
            color: #fff; 
            font-size: 0.70rem; 
            text-decoration: none; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .vip-card { 
            background: #2b3035; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            margin-bottom: 10px; 
        }
        .balance-card {
    background-color: #198754 !important; /* Semanhyia Green */
    color: white !important;
}

.border-white-50 {
    border-right: 1px solid rgba(255,255,255,0.5) !important;
}
    </style>
</head>
<body class="bg-dark text-white">

    <div class="mobile-container">
        <div class="content-wrapper">
            {% block content %} {% endblock %}
        </div>
        
        <nav class="bottom-nav">
            <a href="{% url 'dashboard' %}" class="nav-link-custom">
                <i class="bi bi-house-door-fill" style="font-size: 1.2rem;"></i>
                <div>Projects</div>
            </a>
            <a href="{% url 'income' %}" class="nav-link-custom">
                <i class="bi bi-wallet2" style="font-size: 1.2rem;"></i>
                <div>Income</div>
            </a>
            <a href="{% url 'team' %}" class="nav-link-custom">
                <i class="bi bi-people-fill" style="font-size: 1.2rem;"></i>
                <div>Team</div>
            </a>
            <a href="{% url 'mine' %}" class="nav-link-custom">
                <i class="bi bi-person-circle" style="font-size: 1.2rem;"></i>
                <div>Mine</div>
            </a>
        </nav>
    </div>
    
    <script>
        document.querySelectorAll('.nav-link-custom').forEach(link => {
            const currentPath = window.location.pathname;
            const linkPath = link.getAttribute('href');

            // Exact match highlighting
            if (currentPath === linkPath) {
                link.classList.add('text-success');
                link.style.fontWeight = 'bold';
            }
        });
    </script>
</body>
</html>
