{% extends 'base.html' %}

{% block content %}
<div class="mb-4 d-flex align-items-center">
    <a href="{% url 'team' %}" class="text-white me-3 text-decoration-none"><i class="bi bi-arrow-left"></i></a>
    <h2 class="text-white mb-0">My Team Members</h2>
</div>

<div class="list-group">
    {% for member in team_members %}
    <div class="list-group-item bg-dark text-white border-secondary d-flex justify-content-between align-items-center mb-2 rounded">
        <span><i class="bi bi-phone me-2 text-success"></i>{{ member.mobile|slice:":3" }}****{{ member.mobile|slice:"-2:" }}</span>
        <span class="badge bg-success">Active</span>
    </div>
    {% empty %}
    <p class="text-secondary text-center mt-5">No team members found yet.</p>
    {% endfor %}
</div>
{% endblock %}
